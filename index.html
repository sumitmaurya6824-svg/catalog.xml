<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Product Catalog</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1.5rem; background: #fff; }
    h2 { font-size: 16px; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 1px solid #ddd; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; color: #888; font-weight: 500; border-bottom: 1px solid #ddd; }
    td { padding: 9px 10px; border-bottom: 1px solid #eee; color: #222; }
    td:last-child { text-align: right; }
    th:last-child { text-align: right; }
  </style>
</head>
<body>
  <h2>Product Catalog</h2>
  <table>
    <thead>
      <tr><th>Name</th><th>Category</th><th>Price</th></tr>
    </thead>
    <tbody>
      <tr><td>Wireless Mouse</td><td>Electronics</td><td>$29.99</td></tr>
      <tr><td>Mechanical Keyboard</td><td>Electronics</td><td>$89.99</td></tr>
      <tr><td>Running Shoes</td><td>Footwear</td><td>$59.99</td></tr>
      <tr><td>Stainless Steel Bottle</td><td>Kitchen</td><td>$19.99</td></tr>
      <tr><td>Notebook A5</td><td>Stationery</td><td>$8.49</td></tr>
    </tbody>
  </table>
</body>
</html>
